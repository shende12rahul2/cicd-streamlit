# ──────────────────────────────────────────────────────────────────────
# GitHub Actions CI Pipeline — CSV Data Analyzer
# Triggers: Pull Requests to main + pushes to main
# Stages:   lint → test → security-scan
#
# Best Practices Applied:
#   • Pinned action versions with SHA hashes (supply-chain security)
#   • Least-privilege permissions per job
#   • Concurrency control (cancel stale runs)
#   • Pip caching for fast installs
#   • SARIF upload for GitHub Code Scanning integration
#   • Artifact retention for audit trail
# ──────────────────────────────────────────────────────────────────────

name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default: read-only permissions (principle of least privilege)
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Lint ────────────────────────────────────────────────────────
  lint:
    name: "🔍 Lint & Format Check"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Black format check
        run: black --check --diff .

      - name: isort import check
        run: isort --check-only --diff .

  # ── Test ────────────────────────────────────────────────────────
  test:
    name: "🧪 Tests & Coverage"
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      checks: write        # for test report annotations
      pull-requests: write  # for coverage comment
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests with coverage
        run: |
          pytest -v \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml
          retention-days: 30

  # ── Bandit Security Scan (SARIF → Code Scanning) ───────────────
  bandit:
    name: "🛡️ Bandit Security Scan"
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      security-events: write  # required to upload SARIF
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Bandit
        run: pip install bandit[sarif,toml]

      - name: Run Bandit scan
        run: |
          bandit -r src/ -c pyproject.toml \
            -f sarif -o bandit-results.sarif \
            || true

      - name: Upload Bandit SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Upload Bandit artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bandit-sarif
          path: bandit-results.sarif
          retention-days: 30

  # ── Detect Secrets ──────────────────────────────────────────────
  detect-secrets:
    name: "🔐 Secret Leak Detection"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets scan
        run: |
          detect-secrets scan --baseline .secrets.baseline
          detect-secrets audit --report .secrets.baseline

  # ── mypy Type Checking ─────────────────────────────────────────
  typecheck:
    name: "🔎 Type Checking (mypy)"
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy pandas-stubs types-PyYAML

      - name: Run mypy
        run: mypy src/ --config-file=pyproject.toml
