# .github/workflows/ghas-adoption-report.yml
#
# Generates a weekly GHAS report with:
#   - CodeQL code scanning alerts (by severity + detail list)
#   - Dependabot vulnerability alerts (by severity + detail list)
#   - Secret scanning alerts (by type/validity + detail list)
#
# Runs: Every Monday 08:30 UTC — or manually from Actions tab
# Posts: GitHub Issue tagged ghas-report + Workflow summary
#
# Requires: GHAS_REPORT_TOKEN secret (PAT with security_events + repo scopes)
#           needed for Dependabot + Secret Scanning REST APIs

name: GHAS Adoption Report

on:
  schedule:
    - cron: "30 8 * * 1"
  workflow_dispatch:
    inputs:
      days:
        description: "How many days back to analyse (default: 30)"
        required: false
        default: "30"

permissions:
  contents: read
  security-events: read
  issues: write
  pull-requests: read

jobs:
  generate-report:
    name: Generate GHAS Metrics Report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Generate GHAS metrics
        uses: actions/github-script@v7
        env:
          GHAS_PAT: ${{ secrets.GHAS_REPORT_TOKEN }}
        with:
          github-token: ${{ github.token }}
          script: |
            const DAYS_BACK = parseInt('${{ github.event.inputs.days }}' || '30');
            core.info(`Generating GHAS report — last ${DAYS_BACK} days`);

            function severityBadge(sev) {
              if (!sev) return '\u26aa Unknown';
              const s = sev.toLowerCase();
              if (s === 'critical')                   return '\ud83d\udea8 Critical';
              if (s === 'high')                       return '\ud83d\udd34 High';
              if (s === 'medium' || s === 'moderate') return '\ud83d\udfe1 Medium';
              if (s === 'low')                        return '\ud83d\udfe2 Low';
              if (s === 'error')                      return '\u274c Error';
              if (s === 'warning')                    return '\u26a0\ufe0f Warning';
              if (s === 'note')                       return '\ud83d\udcdd Note';
              return `\u26aa ${sev}`;
            }

            const ghasPat   = process.env.GHAS_PAT;
            const patClient = ghasPat ? github.getOctokit(ghasPat) : null;
            const owner     = context.repo.owner;
            const repo      = context.repo.repo;

            // ══════════════════════════════════════════════════════════════════
            // SECTION 1 — CodeQL Code Scanning (open alerts only)
            // ══════════════════════════════════════════════════════════════════
            core.info('Fetching CodeQL alerts...');
            let codeqlAlerts = [];
            try {
              const { data } = await github.rest.codeScanning.listAlertsForRepo({
                owner, repo, state: 'open', per_page: 100,
              });
              codeqlAlerts = data;
              core.info(`CodeQL: fetched ${codeqlAlerts.length} open alerts`);
            } catch (e) {
              core.warning(`Could not fetch CodeQL alerts: ${e.message}`);
            }

            const codeqlBySev = { critical: [], high: [], medium: [], low: [], error: [], warning: [], note: [], unknown: [] };
            for (const alert of codeqlAlerts) {
              let sev = alert.rule?.security_severity_level?.toLowerCase();
              if (!sev) sev = alert.rule?.severity?.toLowerCase();
              if (!sev) sev = 'unknown';
              (codeqlBySev[sev] ?? codeqlBySev.unknown).push(alert);
            }

            // ══════════════════════════════════════════════════════════════════
            // SECTION 2 — Dependabot (open alerts only)
            // ══════════════════════════════════════════════════════════════════
            core.info('Fetching Dependabot alerts...');
            let dependabotOpen = [];
            let dependabotError = null;

            if (!patClient) {
              dependabotError = '`GHAS_REPORT_TOKEN` secret is not configured — add it in repo Settings > Secrets > Actions';
              core.warning('GHAS_REPORT_TOKEN not set — skipping Dependabot');
            } else {
              try {
                const { data } = await patClient.rest.dependabot.listAlertsForRepo({
                  owner, repo, state: 'open', per_page: 100,
                });
                dependabotOpen = data;
                core.info(`Dependabot: fetched ${dependabotOpen.length} open alerts`);
              } catch (e) {
                dependabotError = `API error (${e.status ?? 'unknown'}): ${e.message} — verify GHAS_REPORT_TOKEN has \`repo\` scope`;
                core.error(`Could not fetch Dependabot alerts: ${e.message}`);
              }
            }

            const depBySev = { critical: 0, high: 0, medium: 0, low: 0, unknown: 0 };
            for (const alert of dependabotOpen) {
              const raw = alert.security_advisory?.severity?.toLowerCase() ?? 'unknown';
              const sev = raw === 'moderate' ? 'medium' : raw;
              depBySev[sev] = (depBySev[sev] ?? 0) + 1;
            }

            // ══════════════════════════════════════════════════════════════════
            // SECTION 3 — Secret Scanning (open alerts only)
            // ══════════════════════════════════════════════════════════════════
            core.info('Fetching Secret Scanning alerts...');
            let secretsOpen = [];
            let secretsError = null;

            if (!patClient) {
              secretsError = '`GHAS_REPORT_TOKEN` secret is not configured — add it in repo Settings > Secrets > Actions';
              core.warning('GHAS_REPORT_TOKEN not set — skipping Secret Scanning');
            } else {
              try {
                const { data } = await patClient.rest.secretScanning.listAlertsForRepo({
                  owner, repo, state: 'open', per_page: 100,
                });
                secretsOpen = data;
                core.info(`Secret Scanning: fetched ${secretsOpen.length} open alerts`);
              } catch (e) {
                secretsError = `API error (${e.status ?? 'unknown'}): ${e.message} — verify GHAS_REPORT_TOKEN has \`repo\` scope`;
                core.error(`Could not fetch Secret Scanning alerts: ${e.message}`);
              }
            }

            const secretByType     = {};
            const secretByValidity = {};
            for (const alert of secretsOpen) {
              const type = alert.secret_type_display_name ?? alert.secret_type ?? 'unknown';
              secretByType[type] = (secretByType[type] ?? 0) + 1;
              const val = alert.validity ?? 'unknown';
              secretByValidity[val] = (secretByValidity[val] ?? 0) + 1;
            }
            const activeSecrets = secretsOpen.filter(a => (a.validity ?? '') === 'active').length;

            // ══════════════════════════════════════════════════════════════════
            // BUILD REPORT
            // ══════════════════════════════════════════════════════════════════
            const reportDate = new Date().toLocaleDateString('en-CA');
            let report = `## \ud83d\udee1\ufe0f GHAS Security Report \u2014 ${reportDate}\n\n`;
            report += `**Repo:** ${owner}/${repo} \u00b7 **Generated:** ${new Date().toUTCString()}\n\n`;

            // Summary table
            const totalOpen = codeqlAlerts.length + dependabotOpen.length + secretsOpen.length;
            report += `### \ud83d\udcc8 Summary\n\n`;
            report += `| Scanner | Open Alerts |\n|---|---|\n`;
            report += `| \ud83d\udd0d CodeQL          | **${codeqlAlerts.length}** |\n`;
            report += `| \ud83d\udce6 Dependabot      | **${dependabotOpen.length}** |\n`;
            report += `| \ud83d\udd11 Secret Scanning | **${secretsOpen.length}** |\n`;
            report += `| **Total**        | **${totalOpen}** |\n\n`;

            // ── Section 1: CodeQL ─────────────────────────────────────────────
            report += `---\n### \ud83d\udd0d CodeQL Code Scanning\n\n`;
            report += `| Severity | Count |\n|---|---|\n`;
            report += `| \ud83d\udea8 Critical | ${codeqlBySev.critical.length} |\n`;
            report += `| \ud83d\udd34 High     | ${codeqlBySev.high.length} |\n`;
            report += `| \ud83d\udfe1 Medium   | ${codeqlBySev.medium.length} |\n`;
            report += `| \ud83d\udfe2 Low      | ${codeqlBySev.low.length} |\n`;
            report += `| \u274c Error    | ${codeqlBySev.error.length} |\n`;
            report += `| \u26a0\ufe0f Warning  | ${codeqlBySev.warning.length} |\n`;
            report += `| \ud83d\udcdd Note     | ${codeqlBySev.note.length} |\n`;
            report += `| **Total**   | **${codeqlAlerts.length}** |\n\n`;

            if (codeqlAlerts.length > 0) {
              report += `**Open alerts:**\n\n`;
              report += `| # | Severity | Rule | Description | File | Link |\n|---|---|---|---|---|---|\n`;
              for (const a of codeqlAlerts.slice(0, 25)) {
                const sev  = a.rule?.security_severity_level || a.rule?.severity || 'unknown';
                const desc = (a.rule?.description ?? a.rule?.id ?? '\u2014').replace(/\|/g, '\\|');
                const file = a.most_recent_instance?.location?.path ?? '\u2014';
                const line = a.most_recent_instance?.location?.start_line ?? '?';
                report += `| ${a.number} | ${severityBadge(sev)} | \`${a.rule?.id ?? '\u2014'}\` | ${desc} | \`${file}:${line}\` | [\u2192](${a.html_url}) |\n`;
              }
              if (codeqlAlerts.length > 25) {
                report += `\n_...and ${codeqlAlerts.length - 25} more. [View all](https://github.com/${owner}/${repo}/security/code-scanning)_\n`;
              }
              report += `\n`;
            }

            // ── Section 2: Dependabot ─────────────────────────────────────────
            report += `---\n### \ud83d\udce6 Dependabot Vulnerability Alerts\n\n`;
            if (dependabotError) {
              report += `> \u26a0\ufe0f _${dependabotError}_\n\n`;
            } else {
              report += `| Severity | Count |\n|---|---|\n`;
              report += `| \ud83d\udea8 Critical | ${depBySev.critical} |\n`;
              report += `| \ud83d\udd34 High     | ${depBySev.high} |\n`;
              report += `| \ud83d\udfe1 Medium   | ${depBySev.medium} |\n`;
              report += `| \ud83d\udfe2 Low      | ${depBySev.low} |\n`;
              report += `| **Total**   | **${dependabotOpen.length}** |\n\n`;

              if (dependabotOpen.length > 0) {
                report += `**Open alerts:**\n\n`;
                report += `| # | Severity | Package | Advisory | CVE | Link |\n|---|---|---|---|---|---|\n`;
                for (const a of dependabotOpen) {
                  const raw   = a.security_advisory?.severity ?? 'unknown';
                  const sev   = raw.toLowerCase() === 'moderate' ? 'medium' : raw;
                  const pkg   = a.dependency?.package?.name ?? '\u2014';
                  const eco   = a.dependency?.package?.ecosystem ?? '';
                  const title = (a.security_advisory?.summary ?? '\u2014').replace(/\|/g, '\\|');
                  const cve   = a.security_advisory?.cve_id ?? a.security_advisory?.ghsa_id ?? '\u2014';
                  report += `| ${a.number} | ${severityBadge(sev)} | \`${pkg}\` (${eco}) | ${title} | ${cve} | [\u2192](${a.html_url}) |\n`;
                }
                report += `\n`;
              }
            }

            // ── Section 3: Secret Scanning ────────────────────────────────────
            report += `---\n### \ud83d\udd11 Secret Scanning\n\n`;
            if (secretsError) {
              report += `> \u26a0\ufe0f _${secretsError}_\n\n`;
            } else {
              report += `| Metric | Count |\n|---|---|\n`;
              report += `| Open alerts | **${secretsOpen.length}** |\n`;
              report += `| \ud83d\udd34 Active (still valid) | **${activeSecrets}** |\n\n`;

              if (Object.keys(secretByValidity).length > 0) {
                report += `**By validity:**\n\n`;
                report += `| Validity | Count |\n|---|---|\n`;
                for (const [val, count] of Object.entries(secretByValidity).sort((a, b) => b[1] - a[1])) {
                  report += `| ${val} | ${count} |\n`;
                }
                report += `\n`;
              }

              if (Object.keys(secretByType).length > 0) {
                report += `**By secret type:**\n\n`;
                report += `| Secret Type | Count |\n|---|---|\n`;
                for (const [type, count] of Object.entries(secretByType).sort((a, b) => b[1] - a[1])) {
                  report += `| ${type} | ${count} |\n`;
                }
                report += `\n`;
              }

              if (secretsOpen.length > 0) {
                report += `**Open alerts:**\n\n`;
                report += `| # | Secret Type | Validity | Detected | Link |\n|---|---|---|---|---|\n`;
                for (const a of secretsOpen.slice(0, 20)) {
                  const detected = new Date(a.created_at).toLocaleDateString('en-CA');
                  report += `| ${a.number} | ${a.secret_type_display_name ?? a.secret_type} | ${a.validity ?? 'unknown'} | ${detected} | [\u2192](${a.html_url}) |\n`;
                }
                if (secretsOpen.length > 20) {
                  report += `\n_...and ${secretsOpen.length - 20} more. [View all](https://github.com/${owner}/${repo}/security/secret-scanning)_\n`;
                }
                report += `\n`;
              }
            }

            // ── Action Items ──────────────────────────────────────────────────
            report += `---\n### \u2705 Action Items\n\n`;
            const actions = [];
            if (codeqlBySev.critical.length > 0)
              actions.push(`\ud83d\udea8 **${codeqlBySev.critical.length} critical CodeQL alert(s)** \u2014 fix immediately, blocks PR merges`);
            if (depBySev.critical > 0)
              actions.push(`\ud83d\udea8 **${depBySev.critical} critical Dependabot alert(s)** \u2014 update dependencies immediately`);
            if (activeSecrets > 0)
              actions.push(`\ud83d\udd11 **${activeSecrets} active secret(s) detected** \u2014 credentials still valid, rotate immediately`);
            else if (secretsOpen.length > 0)
              actions.push(`\ud83d\udd11 **${secretsOpen.length} open secret alert(s)** \u2014 review and close alerts for rotated/revoked credentials`);
            if (codeqlBySev.high.length > 0)
              actions.push(`\ud83d\udd34 **${codeqlBySev.high.length} high CodeQL alert(s)** \u2014 fix within current sprint`);
            if (depBySev.high > 0)
              actions.push(`\ud83d\udd34 **${depBySev.high} high Dependabot alert(s)** \u2014 fix within current sprint`);

            if (actions.length === 0) {
              report += `> \u2705 No critical or high priority actions required.\n\n`;
            } else {
              for (const action of actions) report += `- ${action}\n`;
              report += `\n`;
            }

            report += `\n> \ud83d\udd17 [CodeQL](https://github.com/${owner}/${repo}/security/code-scanning) \u00b7 `;
            report += `[Dependabot](https://github.com/${owner}/${repo}/security/dependabot) \u00b7 `;
            report += `[Secret scanning](https://github.com/${owner}/${repo}/security/secret-scanning)\n\n`;
            report += `---\n> _Auto-generated by GHAS Adoption Report workflow_`;

            // ── Write to workflow summary ──────────────────────────────────────
            await core.summary.addRaw(report).write();
            core.info('Written to workflow summary.');

            // ── Create or update GitHub Issue ──────────────────────────────────
            const issueLabel  = 'ghas-report';
            const issueMarker = '<!-- ghas-adoption-report -->';
            const issueTitle  = `\ud83d\udee1\ufe0f GHAS Security Report \u2014 ${reportDate}`;
            const issueBody   = `${issueMarker}\n${report}`;

            try {
              await github.rest.issues.createLabel({ owner, repo, name: issueLabel, color: 'd93f0b' });
            } catch (_) {}

            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: issueLabel, per_page: 10,
            });

            const existing = existingIssues.find(i => i.body?.includes(issueMarker));
            if (existing) {
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, state: 'closed' });
              core.info(`Closed old report issue #${existing.number}`);
            }

            const { data: newIssue } = await github.rest.issues.create({
              owner, repo, title: issueTitle, body: issueBody, labels: [issueLabel],
            });

            core.info(`Report issue created: #${newIssue.number} \u2014 ${newIssue.html_url}`);
            core.notice(`GHAS: ${codeqlAlerts.length} CodeQL | ${dependabotOpen.length} Dependabot | ${secretsOpen.length} Secrets`);
