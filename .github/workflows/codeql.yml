# ──────────────────────────────────────────────────────────────────────
# GitHub Advanced Security — CodeQL Analysis
#
# Performs semantic code analysis using GitHub's CodeQL engine.
# Results appear in the Security tab → Code Scanning Alerts.
#
# Best Practices:
#   • Runs on PR + push + weekly schedule (catch new CVE patterns)
#   • Python uses build-mode: none (interpreted, no compilation needed)
#   • Pinned action SHAs
#   • Minimal permissions
# ──────────────────────────────────────────────────────────────────────

name: "CodeQL Analysis"

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Run weekly on Monday at 06:00 UTC to catch new vulnerability patterns
    - cron: "0 6 * * 1"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: "🔬 CodeQL (${{ matrix.language }})"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      security-events: write  # required to upload SARIF results
      actions: read           # required for private repo workflows

    strategy:
      fail-fast: false
      matrix:
        language: [python]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (for better analysis)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        with:
          languages: ${{ matrix.language }}
          # Python is interpreted — no build step needed
          build-mode: none
          # Use extended query suite for deeper analysis
          queries: security-extended
          # Configure paths to scan
          config: |
            paths:
              - src
            paths-ignore:
              - tests
              - .venv

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        with:
          category: "/language:${{ matrix.language }}"
