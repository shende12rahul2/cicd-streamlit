# .github/workflows/codeql.yml
#
# Optimisations applied:
#   - Autobuild removed — not needed for JS/Python (interpreted languages)
#   - File exclusions via inline config — skips test/vendor/generated files
#   - CODEQL_DISABLE_TELEMETRY fixes self-hosted telemetry warning
#   - permissions moved to top-level — fixes "Resource not accessible" on self-hosted
#   - actions: read added — required for workflow-run API on self-hosted runners
#   - timeout-minutes added — prevents hung jobs on self-hosted runners
#   - security-gate permissions removed (inherited from top-level)

name: CodeQL Security Scan

on:
  pull_request:
    branches:
      - dev
      - uat
      - production
  push:
    branches:
      - dev
      - main
      - production
  schedule:
    - cron: "0 2 * * 1"

concurrency:
  # One active run per branch / PR at a time.
  # New commit on a PR  → cancels the old in-progress run immediately.
  # New push to a branch → cancels any in-progress run for that branch.
  # Scheduled scan      → never cancelled (uses a fixed key).
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Fixes: "Failed to gather information for telemetry: Resource not accessible"
  # This error appears on self-hosted runners that cannot reach GitHub telemetry endpoints
  CODEQL_DISABLE_TELEMETRY: true

# ── Top-level permissions ───────────────────────────────────────────────────
# Must be at top level on self-hosted runners — job-level overrides are
# sometimes ignored, causing "Resource not accessible by integration" errors
permissions:
  contents: read
  security-events: write   # upload SARIF results + read alerts
  pull-requests: write     # post PR comments
  issues: write            # open tracking issues on push
  actions: read            # required for workflow-run API on self-hosted runners

jobs:
  # ─────────────────────────────────────────────
  # 1. CodeQL static analysis
  # ─────────────────────────────────────────────
  analyze:
    name: CodeQL Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript
          - python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
          # Inline exclusions — CodeQL skips these paths entirely.
          # Scanning test/vendor/generated files wastes time and produces noise.
          # Add your own paths below following the same glob pattern.
          config: |
            paths-ignore:
              - '**/node_modules/**'
              - '**/vendor/**'
              - '**/dist/**'
              - '**/build/**'
              - '**/__pycache__/**'
              - '**/*.min.js'
              - '**/*.bundle.js'
              - '**/test/**'
              - '**/tests/**'
              - '**/*.test.js'
              - '**/*.spec.js'
              - '**/*.test.ts'
              - '**/*.spec.ts'
              - '**/test_*.py'
              - '**/*_test.py'
              - '**/migrations/**'
              - '**/fixtures/**'
              - '**/mock/**'
              - '**/mocks/**'
              - '**/generated/**'
              - '**/*.generated.js'
              - '**/coverage/**'
              - '**/.venv/**'
              - '**/venv/**'

      # Autobuild intentionally removed.
      # JS and Python are interpreted — CodeQL extracts them without compilation.
      # Autobuild only matters for compiled languages (Java, C++, C#, Go).
      # Removing it saves 1–3 minutes per run.

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: always

  # ─────────────────────────────────────────────
  # 2. Security gate — warn on high, block on critical
  #    Posts PR comment with critical+high findings only
  #    Opens tracking Issue on direct push
  # ─────────────────────────────────────────────
  security-gate:
    name: Security Gate / Block Critical
    runs-on: ubuntu-latest
    needs: analyze
    timeout-minutes: 10
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push'

    steps:
      - name: Check alerts & annotate PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // ── 1. Fetch open CodeQL alerts for this SHA ──────────────────────
            const { data: alerts } = await github.rest.codeScanning.listAlertsForRepo({
              owner:     context.repo.owner,
              repo:      context.repo.repo,
              ref:       context.sha,
              state:     'open',
              tool_name: 'CodeQL',
              per_page:  100,
            });

            if (alerts.length === 0) {
              core.info('✅ No open CodeQL alerts for this commit.');
              return;
            }

            core.info(`Found ${alerts.length} open CodeQL alert(s).`);

            // ── 2. Bucket alerts by severity ──────────────────────────────────
            const critical = [];
            const high     = [];

            for (const alert of alerts) {
              const loc = alert.most_recent_instance?.location;
              const sev = alert.rule?.security_severity_level ?? 'unknown';
              const item = {
                sev,
                ruleId:   alert.rule?.id ?? 'unknown',
                desc:     alert.rule?.description ?? '',
                filePath: loc?.path ?? '',
                line:     loc?.start_line ?? '?',
                url:      alert.html_url ?? '',
              };
              if      (sev === 'critical') critical.push(item);
              else if (sev === 'high')     high.push(item);
              // medium / low / info — silently ignored in PR comment
            }

            // ── 3. Build comment — critical + high only ───────────────────────
            function badge(sev) {
              return sev === 'critical' ? '🚨 **CRITICAL**' : '⚠️ **HIGH**';
            }

            const visibleFindings = [...critical, ...high];
            const branch = context.ref?.replace('refs/heads/', '') ?? context.ref;
            let body = `## 🔐 CodeQL Security Findings\n\n`;

            if (critical.length) {
              body += `> ❌ **${critical.length} critical — merge is BLOCKED.**`;
              if (high.length) body += ` ${high.length} high also found.`;
              body += `\n\n`;
            } else if (high.length) {
              body += `> ⚠️ **${high.length} high severity issue(s) found.** No critical — merge is not blocked.\n\n`;
            } else {
              body += `> ✅ No critical or high severity issues.\n\n`;
            }

            if (visibleFindings.length > 0) {
              body += `| Severity | Rule | File | Line | Description | Link |\n`;
              body += `|---|---|---|---|---|---|\n`;
              for (const f of visibleFindings) {
                body += `| ${badge(f.sev)} | \`${f.ruleId}\` | \`${f.filePath}\` | ${f.line} | ${f.desc} | [→](${f.url}) |\n`;
              }
            } else {
              body += `_No critical or high findings._\n`;
            }

            body += `\n---\n_CodeQL · \`${branch}\` · ${new Date().toUTCString()}_`;

            // ── 4a. Post / update PR comment ──────────────────────────────────
            if (context.eventName === 'pull_request') {
              const prNumber = context.payload.pull_request.number;
              const marker   = '<!-- codeql-findings -->';
              const fullBody = `${marker}\n${body}`;

              const { data: comments } = await github.rest.issues.listComments({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: prNumber,
                per_page:     100,
              });

              const existing = comments.find(c => c.body?.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner:      context.repo.owner,
                  repo:       context.repo.repo,
                  comment_id: existing.id,
                  body:       fullBody,
                });
              } else {
                await github.rest.issues.createComment({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: prNumber,
                  body:         fullBody,
                });
              }
            }

            // ── 4b. Open tracking Issue on direct push ────────────────────────
            if (context.eventName === 'push' && visibleFindings.length > 0) {
              const issueMarker = `<!-- codeql-${context.sha} -->`;
              const issueTitle  = `🔐 CodeQL findings on \`${branch}\` — ${new Date().toLocaleDateString('en-CA')}`;
              const issueBody   = `${issueMarker}\n${body}`;

              const { data: existingIssues } = await github.rest.issues.listForRepo({
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                state:    'open',
                labels:   'codeql',
                per_page: 50,
              });

              const existing = existingIssues.find(i => i.body?.includes(issueMarker));
              if (existing) {
                await github.rest.issues.update({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: existing.number,
                  body:         issueBody,
                });
                core.info(`Updated tracking issue #${existing.number}`);
              } else {
                for (const [name, color] of [['security','e11d48'],['codeql','f97316']]) {
                  try {
                    await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name, color });
                  } catch(_) {}
                }
                const { data: newIssue } = await github.rest.issues.create({
                  owner:  context.repo.owner,
                  repo:   context.repo.repo,
                  title:  issueTitle,
                  body:   issueBody,
                  labels: ['security', 'codeql'],
                });
                core.info(`Opened tracking issue #${newIssue.number}: ${newIssue.html_url}`);
              }
            }

            // ── 5. Workflow annotations ───────────────────────────────────────
            for (const f of high) {
              core.warning(`[HIGH] ${f.ruleId}: ${f.desc} — ${f.filePath}:${f.line}`);
            }
            for (const f of critical) {
              core.error(`[CRITICAL] ${f.ruleId}: ${f.desc} — ${f.filePath}:${f.line}`);
            }

            // ── 6. Block merge on critical ─────────────────────────────────────
            if (critical.length > 0) {
              core.setFailed(
                context.eventName === 'pull_request'
                  ? `Merge blocked: ${critical.length} critical finding(s). See PR comment for details.`
                  : `⚠️ ${critical.length} critical finding(s) on ${branch}. Tracking issue opened.`
              );
            }
