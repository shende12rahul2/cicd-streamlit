# ============================================================
#  GHAS — CodeQL CI Scan (Python + TypeScript)
#  Place at: .github/workflows/codeql.yml
#
#  ✅ Runs ONLY on pull_request (CI gate)
#  ✅ Fails pipeline ONLY on critical findings
#  ✅ Posts summary comment on PR
#  ✅ Enterprise-ready (GitHub Advanced Security required)
# ============================================================

name: "🔐 CodeQL Security Scan"

on:
  pull_request:
    branches:
      - main
      - master
      - develop
      - "release/**"
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"

# Cancel in-progress runs for the same PR to save Actions minutes
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write   # Upload SARIF to GitHub Security tab
  pull-requests: write     # Post PR comment with results

jobs:
  codeql:
    name: "CodeQL — ${{ matrix.language }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false       # Let both languages finish even if one fails
      matrix:
        language:
          - python

    steps:
      # ── 1. Checkout ─────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Initialize CodeQL ────────────────────────────────
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

          # security-extended = default queries + broader CWE coverage
          # Change to "default" if scans are too slow
          queries: security-extended

          # Skip dependency install — speeds up PR scans significantly
          dependency-caching: false

      # ── 3. Autobuild (no manual build needed for Python/TS) ──
      # CodeQL handles Python and TypeScript without a build step.
      # If your TS project requires a specific build, replace with:
      #   - run: npm ci && npm run build
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      # ── 4. Run Analysis & Upload to Security Tab ────────────
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          output: sarif-results
          upload: true

      # ── 5. Save SARIF as artifact (downloadable report) ─────
      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sarif-${{ matrix.language }}-${{ github.run_number }}
          path: sarif-results/
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # Gate job: runs after both language scans complete.
  # Fails the PR ONLY if critical alerts exist.
  # Medium/High/Low alerts are reported but do NOT block merge.
  # ──────────────────────────────────────────────────────────
  security-gate:
    name: "🚦 Security Gate"
    runs-on: ubuntu-latest
    needs: codeql
    if: always() && needs.codeql.result != 'cancelled'
    permissions:
      security-events: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Fetch open alerts from GitHub Security API ─────────
      - name: Fetch CodeQL alerts
        id: alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/code-scanning/alerts?state=open&per_page=100" \
            --paginate > alerts.json 2>/dev/null || echo "[]" > alerts.json

          CRITICAL=$(jq '[.[] | select(.rule.security_severity_level == "critical")] | length' alerts.json)
          HIGH=$(jq     '[.[] | select(.rule.security_severity_level == "high")]     | length' alerts.json)
          MEDIUM=$(jq   '[.[] | select(.rule.security_severity_level == "medium")]   | length' alerts.json)
          LOW=$(jq      '[.[] | select(.rule.security_severity_level == "low")]      | length' alerts.json)
          TOTAL=$(jq    'length' alerts.json)

          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH"         >> $GITHUB_OUTPUT
          echo "medium=$MEDIUM"     >> $GITHUB_OUTPUT
          echo "low=$LOW"           >> $GITHUB_OUTPUT
          echo "total=$TOTAL"       >> $GITHUB_OUTPUT

          echo "critical=$CRITICAL | high=$HIGH | medium=$MEDIUM | low=$LOW"

      # ── Build top-alert list for PR comment ────────────────
      - name: Build alert details
        id: details
        run: |
          jq -r '
            [ .[] | select(.rule.security_severity_level == "critical" or .rule.security_severity_level == "high") ]
            | sort_by(.rule.security_severity_level)
            | .[:10]
            | .[]
            | "| \(.rule.security_severity_level | ascii_upcase) | `\(.rule.id)` | `\(.most_recent_instance.location.path // "N/A"):\(.most_recent_instance.location.start_line // "?")` | [\(.rule.description // "view")]\((.html_url)) |"
          ' alerts.json > top_alerts.txt || true

          {
            echo 'table<<EOF'
            cat top_alerts.txt
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      # ── Post PR comment with scan summary ──────────────────
      - name: Post PR comment
        uses: actions/github-script@v7
        env:
          CRITICAL: ${{ steps.alerts.outputs.critical }}
          HIGH:     ${{ steps.alerts.outputs.high }}
          MEDIUM:   ${{ steps.alerts.outputs.medium }}
          LOW:      ${{ steps.alerts.outputs.low }}
          TOTAL:    ${{ steps.alerts.outputs.total }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const critical = parseInt(process.env.CRITICAL) || 0;
            const high     = parseInt(process.env.HIGH)     || 0;
            const medium   = parseInt(process.env.MEDIUM)   || 0;
            const low      = parseInt(process.env.LOW)      || 0;
            const total    = parseInt(process.env.TOTAL)    || 0;

            const alertsUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/security/code-scanning`;

            let status, statusMsg;
            if (critical > 0) {
              status    = "🚨 CRITICAL — Pipeline blocked";
              statusMsg = "Critical vulnerabilities found. **This PR cannot be merged until they are resolved.**";
            } else if (high > 0) {
              status    = "🟠 HIGH — Review required";
              statusMsg = "High severity issues found. Pipeline is not blocked, but please review before merging.";
            } else if (medium > 0 || low > 0) {
              status    = "🟡 WARNINGS — Non-blocking";
              statusMsg = "Low/medium severity issues found. These do not block the pipeline.";
            } else {
              status    = "✅ CLEAN — No issues found";
              statusMsg = "No open security alerts detected. Good to merge!";
            }

            const tableRows = `${{ steps.details.outputs.table }}`;
            const tableSection = tableRows.trim()
              ? `## 🔍 Critical & High Alerts\n\n| Severity | Rule | Location | Description |\n|----------|------|----------|-------------|\n${tableRows}`
              : "";

            const body = `<!-- GHAS-CODEQL-REPORT -->
            ## 🔐 CodeQL Security Scan Results

            **Status:** ${status}
            > ${statusMsg}

            ---

            ## 📊 Alert Summary

            | 🔴 Critical | 🟠 High | 🟡 Medium | 🟢 Low | Total |
            |:-----------:|:-------:|:---------:|:------:|:-----:|
            | **${critical}** | **${high}** | **${medium}** | **${low}** | **${total}** |

            ${tableSection}

            ---

            🔗 [View all alerts in Security tab](${alertsUrl}) &nbsp;·&nbsp; 📥 [Download SARIF](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

            > ℹ️ Only **critical** findings block this pipeline. High/Medium/Low are advisory.
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('GHAS-CODEQL-REPORT')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # ── ONLY fail pipeline for critical findings ───────────
      - name: Enforce critical gate
        run: |
          CRITICAL="${{ steps.alerts.outputs.critical }}"
          if [ "$CRITICAL" -gt 0 ]; then
            echo ""
            echo "❌ Pipeline BLOCKED — $CRITICAL critical vulnerability(ies) found."
            echo "   Fix at: https://github.com/${{ github.repository }}/security/code-scanning"
            echo ""
            exit 1
          else
            echo "✅ No critical findings. Pipeline passes."
          fi
