# .github/workflows/codeql.yml
# CodeQL Security Analysis
#
# All actions are pinned to a full commit SHA — NOT a mutable tag.
# This is required by OpenSSF Scorecard (Pinned-Dependencies rule) and
# is the recommended supply-chain security practice.
#
# To update an action:
#   1. Find the new commit SHA:
#      gh api repos/<owner>/<repo>/commits/<tag> --jq '.sha'
#   2. Replace the SHA below and update the # tag comment beside it
#
# Pinned SHAs used here (verify at https://github.com/<owner>/<repo>/releases):
#   actions/checkout@v4.2.2
#     SHA: 11bd71901bbe5b1630ceea73d27597364c9af683
#   github/codeql-action/init@v4
#     SHA: 181d5eefc20863364f96762470ba6f862bdef56b
#   github/codeql-action/autobuild@v4
#     SHA: 181d5eefc20863364f96762470ba6f862bdef56b
#   github/codeql-action/analyze@v4
#     SHA: 181d5eefc20863364f96762470ba6f862bdef56b
#   actions/github-script@v7.0.1
#     SHA: 60a0d83039c74a4aee543508d2ffcb1c3799cdea

name: CodeQL Security Scan

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  schedule:
    - cron: "0 2 * * 1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CODEQL_ACTION_FILE_COVERAGE_ON_PRS: false

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  # ─────────────────────────────────────────────
  # 1. CodeQL static analysis
  # ─────────────────────────────────────────────
  analyze:
    name: CodeQL Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - python
          # - java
          # - csharp
          # - go
          # - ruby

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@181d5eefc20863364f96762470ba6f862bdef56b  # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@181d5eefc20863364f96762470ba6f862bdef56b  # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@181d5eefc20863364f96762470ba6f862bdef56b  # v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: always

  # ─────────────────────────────────────────────
  # 2. Blame attribution + merge gate
  # ─────────────────────────────────────────────
  blame-and-gate:
    name: Blame Authors / Block Critical
    runs-on: ubuntu-latest
    needs: analyze
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/dev')

    permissions:
      contents: read
      security-events: write   # write needed to assign alerts, not just read them
      pull-requests: write
      issues: write

    steps:
      - name: Checkout with full history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0   # full history required for git blame

      - name: Blame authors & annotate PR
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');

            // ── Helper: git blame on a single line ────────────────────────────
            function blameLine(filePath, lineNumber) {
              try {
                const raw = execSync(
                  `git blame --porcelain -L ${lineNumber},${lineNumber} -- "${filePath}"`,
                  { encoding: 'utf8', stdio: ['pipe', 'pipe', 'pipe'] }
                );
                const commitHash  = raw.split('\n')[0].split(' ')[0];
                const authorName  = (raw.match(/^author (.+)$/m)  || [])[1]?.trim() ?? 'Unknown';
                const authorEmail = (raw.match(/^author-mail <(.+)>/m) || [])[1]?.trim() ?? '';
                return { commitHash, authorName, authorEmail };
              } catch (e) {
                core.warning(`git blame failed for ${filePath}:${lineNumber} — ${e.message}`);
                return { commitHash: '', authorName: 'Unknown', authorEmail: '' };
              }
            }

            // ── Helper: git email → GitHub login ─────────────────────────────
            // Strategy 1: look up commit hash via GitHub Commits API (most reliable)
            // Strategy 2: search users by email (fallback — requires public email)
            const emailLoginCache = {};

            async function resolveLogin(authorEmail, commitHash) {
              if (emailLoginCache[authorEmail]) return emailLoginCache[authorEmail];
              let login = null;

              if (commitHash && commitHash !== '0000000000000000000000000000000000000000') {
                try {
                  const { data: commit } = await github.rest.repos.getCommit({
                    owner: context.repo.owner,
                    repo:  context.repo.repo,
                    ref:   commitHash,
                  });
                  login = commit.author?.login ?? null;
                } catch (_) {}
              }

              if (!login && authorEmail && !authorEmail.includes('noreply')) {
                try {
                  const { data: result } = await github.rest.search.users({
                    q: `${authorEmail} in:email`,
                  });
                  if (result.total_count > 0) login = result.items[0].login;
                } catch (_) {}
              }

              const resolved = login ? `@${login}` : null;
              emailLoginCache[authorEmail] = resolved;
              return resolved;
            }

            // ── 1. Fetch open CodeQL alerts for this SHA ──────────────────────
            const { data: alerts } = await github.rest.codeScanning.listAlertsForRepo({
              owner:     context.repo.owner,
              repo:      context.repo.repo,
              ref:       context.sha,
              state:     'open',
              tool_name: 'CodeQL',
              per_page:  100,
            });

            if (alerts.length === 0) {
              core.info('✅ No open CodeQL alerts for this commit.');
              return;
            }

            core.info(`Found ${alerts.length} open CodeQL alert(s). Running git blame…`);

            // ── 2. Enrich each alert with blame data ──────────────────────────
            const critical = [];
            const high     = [];
            const other    = [];
            const authorFindings = {};
            const allLoginsSet   = new Set();

            for (const alert of alerts) {
              const loc        = alert.most_recent_instance?.location;
              const filePath   = loc?.path ?? '';
              const line       = loc?.start_line ?? 1;
              const sev        = alert.rule?.security_severity_level ?? 'unknown';
              const ruleId     = alert.rule?.id ?? 'unknown';
              const desc       = alert.rule?.description ?? '';
              const url        = alert.html_url ?? '';
              const alertNumber = alert.number;   // needed for updateAlert

              const { commitHash, authorName, authorEmail } = filePath
                ? blameLine(filePath, line)
                : { commitHash: '', authorName: 'Unknown', authorEmail: '' };

              const login = await resolveLogin(authorEmail, commitHash);
              const authorLabel = login
                ?? (authorEmail ? `${authorName} <${authorEmail}>` : authorName);

              // ── Assign the alert directly to the blamed author ───────────────
              // This populates the "Assignees" field visible in the Security tab
              // (the "No one" field shown in the screenshot).
              // Requires: security-events: write permission + GitHub login resolved.
              if (login) {
                const assigneeLogin = login.replace('@', '');
                try {
                  await github.rest.codeScanning.updateAlert({
                    owner:        context.repo.owner,
                    repo:         context.repo.repo,
                    alert_number: alertNumber,
                    state:        'open',          // keep open — we are NOT dismissing
                    dismissed_reason: null,
                    // assignee is set via the auto_dismissed_at workaround below
                    // The REST API uses 'assignee' not 'assignees'
                  });
                  // GitHub Code Scanning REST API v3 uses a separate assignees endpoint
                  await github.request(
                    'PUT /repos/{owner}/{repo}/code-scanning/alerts/{alert_number}/assignees',
                    {
                      owner:        context.repo.owner,
                      repo:         context.repo.repo,
                      alert_number: alertNumber,
                      assignees:    [assigneeLogin],
                      headers: { 'X-GitHub-Api-Version': '2022-11-28' },
                    }
                  );
                  core.info(`Alert #${alertNumber} assigned to @${assigneeLogin}`);
                } catch (e) {
                  // Non-fatal: org policy may restrict alert assignment
                  core.warning(`Could not assign alert #${alertNumber} to @${assigneeLogin}: ${e.message}`);
                }
              }

              const finding = {
                ruleId, desc, filePath, line, sev, url,
                alertNumber,
                authorName, authorEmail, commitHash,
                login, authorLabel,
              };

              if      (sev === 'critical') critical.push(finding);
              else if (sev === 'high')     high.push(finding);
              else                         other.push(finding);

              if (!authorFindings[authorLabel]) authorFindings[authorLabel] = [];
              authorFindings[authorLabel].push(finding);
              if (login) allLoginsSet.add(login.replace('@', ''));
            }

            // ── 3. Build PR comment ───────────────────────────────────────────
            function badge(sev) {
              return sev === 'critical' ? '🚨 **CRITICAL**'
                   : sev === 'high'     ? '⚠️ **HIGH**'
                   :                      `ℹ️ ${sev.toUpperCase()}`;
            }

            const allFindings = [...critical, ...high, ...other];
            let body = `## 🔐 CodeQL Security Findings — Blame Report\n\n`;

            if (critical.length) {
              body += `> ❌ **${critical.length} critical issue(s) — merge is BLOCKED.**\n\n`;
            } else {
              body += `> ✅ No critical issues. ${high.length} high, ${other.length} other finding(s).\n\n`;
            }

            body += `### All Findings\n\n`;
            body += `| Severity | Rule | File | Line | Description | Introduced by | Commit | Link |\n`;
            body += `|---|---|---|---|---|---|---|---|\n`;
            for (const f of allFindings) {
              const shortHash  = f.commitHash ? f.commitHash.slice(0, 7) : '–';
              const commitLink = f.commitHash
                ? `[\`${shortHash}\`](https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${f.commitHash})`
                : '–';
              body += `| ${badge(f.sev)} | \`${f.ruleId}\` | \`${f.filePath}\` | ${f.line} | ${f.desc} | ${f.authorLabel} | ${commitLink} | [→](${f.url}) |\n`;
            }

            body += `\n---\n### 👤 Action required — by author\n\n`;
            body += `> Each person below introduced the code containing a security finding.\n> Please fix your finding(s) before this PR can merge.\n\n`;

            for (const [author, findings] of Object.entries(authorFindings)) {
              const critCount = findings.filter(f => f.sev === 'critical').length;
              const highCount = findings.filter(f => f.sev === 'high').length;
              body += `#### ${author}`;
              if (critCount) body += ` · ${critCount} 🚨 critical`;
              if (highCount) body += ` · ${highCount} ⚠️ high`;
              body += `\n\n`;
              for (const f of findings) {
                const shortHash = f.commitHash ? f.commitHash.slice(0, 7) : '';
                const commitRef = shortHash
                  ? ` · introduced in [\`${shortHash}\`](https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${f.commitHash})`
                  : '';
                body += `- ${badge(f.sev)} **\`${f.ruleId}\`** · \`${f.filePath}:${f.line}\`${commitRef}\n`;
                body += `  > ${f.desc}\n`;
                body += `  > [View full alert ↗](${f.url})\n\n`;
              }
            }

            body += `---\n_Blame data sourced from \`git blame\` · ${new Date().toUTCString()}_`;

            // ── 4. Post or update PR comment ──────────────────────────────────
            if (context.eventName === 'pull_request') {
              const prNumber = context.payload.pull_request.number;
              const marker   = '<!-- codeql-blame-report -->';

              const { data: comments } = await github.rest.issues.listComments({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: prNumber,
                per_page:     100,
              });

              const existing = comments.find(c => c.body?.includes(marker));
              const fullBody = `${marker}\n${body}`;

              if (existing) {
                await github.rest.issues.updateComment({
                  owner:      context.repo.owner,
                  repo:       context.repo.repo,
                  comment_id: existing.id,
                  body:       fullBody,
                });
              } else {
                await github.rest.issues.createComment({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: prNumber,
                  body:         fullBody,
                });
              }

              // ── 5. Request review from blamed authors ──────────────────────
              if (allLoginsSet.size > 0) {
                let prAuthorLogin = '';
                try {
                  const { data: pr } = await github.rest.pulls.get({
                    owner:       context.repo.owner,
                    repo:        context.repo.repo,
                    pull_number: prNumber,
                  });
                  prAuthorLogin = pr.user?.login ?? '';
                } catch (_) {}

                const reviewers = [...allLoginsSet].filter(l => l !== prAuthorLogin);
                if (reviewers.length) {
                  try {
                    await github.rest.pulls.requestReviewers({
                      owner:       context.repo.owner,
                      repo:        context.repo.repo,
                      pull_number: prNumber,
                      reviewers,
                    });
                    core.info(`Review requested from: ${reviewers.map(r => '@'+r).join(', ')}`);
                  } catch (e) {
                    core.warning(`Could not request all reviewers: ${e.message}`);
                  }
                }
              }
            }

            // ── 6. Workflow annotations ───────────────────────────────────────
            for (const f of high) {
              core.warning(`[HIGH] ${f.ruleId}: ${f.desc} — ${f.filePath}:${f.line} | author: ${f.authorLabel}`);
            }
            for (const f of critical) {
              core.error(`[CRITICAL] ${f.ruleId}: ${f.desc} — ${f.filePath}:${f.line} | author: ${f.authorLabel}`);
            }

            // ── 7. Block merge on critical ─────────────────────────────────────
            if (critical.length > 0) {
              core.setFailed(
                `Merge blocked: ${critical.length} critical finding(s). ` +
                `Authors notified: ${[...allLoginsSet].map(l => '@'+l).join(', ') || 'see PR comment'}`
              );
            }
