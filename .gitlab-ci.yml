# ──────────────────────────────────────────────────────────────────────
# GitLab CI/CD Pipeline — CSV Data Analyzer
# Triggers: merge requests + pushes to main
# Stages:  lint → security → test → quality
# ──────────────────────────────────────────────────────────────────────

stages:
  - lint
  - security
  - test
  - quality

# ── Global defaults ─────────────────────────────────────────────────

default:
  image: python:3.11-slim
  before_script:
    - pip install --upgrade pip -q
    - pip install -r requirements.txt -q

# Only run on merge requests and main branch pushes
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# Cache pip downloads across jobs
cache:
  key: "${CI_COMMIT_REF_SLUG}-pip"
  paths:
    - .cache/pip
  policy: pull-push

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# ── Stage 1: Lint ───────────────────────────────────────────────────

lint:ruff:
  stage: lint
  script:
    - echo "🔍 Running Ruff linter..."
    - ruff check . --output-format=text
  allow_failure: false

lint:black:
  stage: lint
  script:
    - echo "🎨 Checking Black formatting..."
    - black --check --diff .
  allow_failure: false

lint:isort:
  stage: lint
  script:
    - echo "📦 Checking import sorting..."
    - isort --check-only --diff .
  allow_failure: false

# ── Stage 2: Security ──────────────────────────────────────────────

security:bandit:
  stage: security
  script:
    - echo "🛡️ Running Bandit security scan..."
    - bandit -r src/ -c pyproject.toml -f json -o bandit-report.json || true
    - bandit -r src/ -c pyproject.toml
  artifacts:
    when: always
    paths:
      - bandit-report.json
    expire_in: 30 days
  allow_failure: false

security:detect-secrets:
  stage: security
  script:
    - echo "🔐 Scanning for secrets..."
    - detect-secrets scan --baseline .secrets.baseline
    - detect-secrets audit --report .secrets.baseline
  allow_failure: false

# ── Stage 3: Test ──────────────────────────────────────────────────

test:pytest:
  stage: test
  script:
    - echo "🧪 Running tests with coverage..."
    - pytest -v --tb=short --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=80 --junitxml=report.xml
  artifacts:
    when: always
    paths:
      - coverage.xml
      - report.xml
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 30 days
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  allow_failure: false

# ── Stage 4: Quality ──────────────────────────────────────────────

quality:mypy:
  stage: quality
  script:
    - echo "🔎 Running mypy type checker..."
    - pip install mypy pandas-stubs types-PyYAML -q
    - mypy src/ --config-file=pyproject.toml
  allow_failure: true  # Advisory — does not block merge
